<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 台灣美食探索地圖</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React & ReactDOM (使用生產環境版本以加快速度，開發時可改 development) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 載入 Babel 以在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // -------------------------------------------------------------------------
    // 手動建構 SVG Icons (取代原先的 lucide-react，確保單一 HTML 能完美運行)
    // -------------------------------------------------------------------------
    const IconWrapper = ({ size = 24, className = "", children, ...props }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
        {children}
      </svg>
    );

    const MapPin = (props) => <IconWrapper {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></IconWrapper>;
    const Search = (props) => <IconWrapper {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></IconWrapper>;
    const TrendingUp = (props) => <IconWrapper {...props}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></IconWrapper>;
    const Utensils = (props) => <IconWrapper {...props}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></IconWrapper>;
    const Star = (props) => <IconWrapper {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></IconWrapper>;
    const Info = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></IconWrapper>;
    const ChevronRight = (props) => <IconWrapper {...props}><path d="m9 18 6-6-6-6"/></IconWrapper>;
    const Filter = (props) => <IconWrapper {...props}><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></IconWrapper>;
    const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></IconWrapper>;
    const MousePointer2 = (props) => <IconWrapper {...props}><path d="m4 4 7.07 17 2.51-7.39L21 11.07z"/></IconWrapper>;
    const BrainCircuit = (props) => (
      <IconWrapper {...props}>
        <path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08 2.5 2.5 0 0 0 4.91.05L12 20V4.5Z"/>
        <path d="M16 8V5c0-1.1.9-2 2-2"/><path d="M12 13h4"/><path d="M12 18h6a2 2 0 0 1 2 2v1"/>
        <path d="M12 8h8"/><circle cx="20" cy="8" r="1"/><circle cx="16" cy="13" r="1"/><circle cx="20" cy="21" r="1"/><circle cx="18" cy="3" r="1"/>
      </IconWrapper>
    );

    // -------------------------------------------------------------------------
    // 應用程式資料與邏輯
    // -------------------------------------------------------------------------
    const TAIWAN_REGIONS = [
      { id: 'north', name: '北部地區', cities: ['台北', '新北', '基隆', '桃園', '新竹'], color: 'bg-blue-500' },
      { id: 'central', name: '中部地區', cities: ['台中', '彰化', '南投', '雲林', '苗栗'], color: 'bg-green-500' },
      { id: 'south', name: '南部地區', cities: ['台南', '高雄', '屏東', '嘉義'], color: 'bg-orange-500' },
      { id: 'east', name: '東部地區', cities: ['花蓮', '台東', '宜蘭'], color: 'bg-purple-500' },
      { id: 'islands', name: '離島地區', cities: ['澎湖', '金門', '馬祖'], color: 'bg-teal-500' }
    ];

    const FOOD_DATA = [
      { id: 1, name: '紅燒牛肉麵', city: '台北', region: 'north', rating: 4.8, aiScore: 95, tags: ['老字號', '必吃'], sentiment: 0.92, popularity: 88 },
      { id: 2, name: '珍珠奶茶', city: '台中', region: 'central', rating: 4.9, aiScore: 98, tags: ['發源地', '國際化'], sentiment: 0.95, popularity: 99 },
      { id: 3, name: '台南牛肉湯', city: '台南', region: 'south', rating: 4.9, aiScore: 97, tags: ['新鮮直送', '溫體牛'], sentiment: 0.98, popularity: 92 },
      { id: 4, name: '池上便當', city: '台東', region: 'east', rating: 4.6, aiScore: 91, tags: ['在地米', '歷史悠久'], sentiment: 0.89, popularity: 85 },
      { id: 5, name: '卑南豬血湯', city: '台東', region: 'east', rating: 4.5, aiScore: 88, tags: ['排隊名店'], sentiment: 0.85, popularity: 80 },
      { id: 6, name: '滷肉飯', city: '台北', region: 'north', rating: 4.7, aiScore: 94, tags: ['庶民美食', '金賞'], sentiment: 0.91, popularity: 95 },
      { id: 7, name: '太陽餅', city: '台中', region: 'central', rating: 4.4, aiScore: 89, tags: ['伴手禮'], sentiment: 0.82, popularity: 82 },
      { id: 8, name: '周氏蝦捲', city: '台南', region: 'south', rating: 4.5, aiScore: 90, tags: ['安平特色'], sentiment: 0.87, popularity: 86 },
    ];

    const App = () => {
      const [selectedRegion, setSelectedRegion] = useState('all');
      const [searchQuery, setSearchQuery] = useState('');
      const [activeTab, setActiveTab] = useState('grid'); // grid or analytics

      const filteredFood = useMemo(() => {
        return FOOD_DATA.filter(item => {
          const matchesRegion = selectedRegion === 'all' || item.region === selectedRegion;
          const matchesSearch = item.name.includes(searchQuery) || item.city.includes(searchQuery);
          return matchesRegion && matchesSearch;
        });
      }, [selectedRegion, searchQuery]);

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-900">
          {/* Header */}
          <header className="sticky top-0 z-30 w-full border-b bg-white/80 backdrop-blur-md">
            <div className="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
              <div className="flex items-center gap-2">
                <div className="flex h-10 w-10 items-center justify-center rounded-xl bg-emerald-600 text-white shadow-lg shadow-emerald-200">
                  <BrainCircuit size={24} />
                </div>
                <div>
                  <h1 className="text-xl font-bold tracking-tight">AI 台灣美食地圖</h1>
                  <p className="text-xs text-slate-500 font-medium">Smart Gastronomy Analysis</p>
                </div>
              </div>

              <div className="hidden md:flex flex-1 max-w-md mx-8">
                <div className="relative w-full">
                  <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                  <input
                    type="text"
                    placeholder="搜尋美食、城市或標籤..."
                    className="w-full rounded-full border-slate-200 bg-slate-100 py-2 pl-10 pr-4 text-sm focus:border-emerald-500 focus:outline-none focus:ring-2 focus:ring-emerald-500/20 transition-all"
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                  />
                </div>
              </div>

              <div className="flex items-center gap-4">
                <button className="hidden sm:flex items-center gap-2 rounded-lg bg-emerald-50 px-3 py-2 text-sm font-semibold text-emerald-700 transition hover:bg-emerald-100">
                  <Award size={18} />
                  <span>2026 年度大賞</span>
                </button>
                <div className="h-8 w-8 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-sm">
                  <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User" />
                </div>
              </div>
            </div>
          </header>

          <main className="mx-auto max-w-7xl p-4 sm:p-6 lg:p-8">
            <div className="grid grid-cols-1 gap-8 lg:grid-cols-4">
              
              {/* Sidebar Filters */}
              <aside className="lg:col-span-1 space-y-6">
                <div className="rounded-2xl border bg-white p-5 shadow-sm">
                  <h3 className="mb-4 flex items-center gap-2 font-bold text-slate-800">
                    <Filter size={18} className="text-emerald-600" />
                    區域篩選
                  </h3>
                  <div className="space-y-2">
                    <button
                      onClick={() => setSelectedRegion('all')}
                      className={`w-full flex items-center justify-between px-4 py-2.5 rounded-xl text-sm font-medium transition-all ${
                        selectedRegion === 'all' 
                        ? 'bg-emerald-600 text-white shadow-md' 
                        : 'text-slate-600 hover:bg-slate-100'
                      }`}
                    >
                      <span>全台灣</span>
                      <ChevronRight size={14} className={selectedRegion === 'all' ? 'opacity-100' : 'opacity-0'} />
                    </button>
                    {TAIWAN_REGIONS.map((region) => (
                      <button
                        key={region.id}
                        onClick={() => setSelectedRegion(region.id)}
                        className={`w-full flex items-center justify-between px-4 py-2.5 rounded-xl text-sm font-medium transition-all ${
                          selectedRegion === region.id 
                          ? 'bg-emerald-600 text-white shadow-md' 
                          : 'text-slate-600 hover:bg-slate-100'
                        }`}
                      >
                        <div className="flex items-center gap-3">
                          <div className={`h-2 w-2 rounded-full ${region.id === selectedRegion ? 'bg-white' : region.color}`}></div>
                          <span>{region.name}</span>
                        </div>
                        <ChevronRight size={14} className={selectedRegion === region.id ? 'opacity-100' : 'opacity-0'} />
                      </button>
                    ))}
                  </div>
                </div>

                <div className="rounded-2xl border bg-gradient-to-br from-emerald-600 to-teal-700 p-5 text-white shadow-lg shadow-emerald-100">
                  <h3 className="mb-2 flex items-center gap-2 font-bold">
                    <BrainCircuit size={18} />
                    AI 推薦引擎
                  </h3>
                  <p className="mb-4 text-xs opacity-90 leading-relaxed">
                    分析了超過 5,000 萬則社群評論與 Google Maps 數據，為您推薦目前熱度最高的料理。
                  </p>
                  <button className="w-full rounded-xl bg-white/20 py-2.5 text-xs font-bold backdrop-blur-sm transition hover:bg-white/30 border border-white/20">
                    啟動深度路徑分析
                  </button>
                </div>
              </aside>

              {/* Main Content */}
              <div className="lg:col-span-3 space-y-6">
                {/* Stats Summary */}
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {[
                    { label: '追蹤店家', value: '1,284+', icon: Utensils, color: 'text-blue-600', bg: 'bg-blue-50' },
                    { label: '平均滿意度', value: '4.72', icon: Star, color: 'text-yellow-600', bg: 'bg-yellow-50' },
                    { label: '趨勢熱度', value: '+12%', icon: TrendingUp, color: 'text-emerald-600', bg: 'bg-emerald-50' },
                    { label: '數據點', value: '54.2M', icon: Info, color: 'text-purple-600', bg: 'bg-purple-50' },
                  ].map((stat, idx) => (
                    <div key={idx} className="rounded-2xl border bg-white p-4 shadow-sm">
                      <div className={`mb-3 inline-flex rounded-lg p-2 ${stat.bg} ${stat.color}`}>
                        <stat.icon size={20} />
                      </div>
                      <div className="text-2xl font-bold text-slate-800">{stat.value}</div>
                      <div className="text-xs font-medium text-slate-500">{stat.label}</div>
                    </div>
                  ))}
                </div>

                {/* View Switcher */}
                <div className="flex items-center justify-between border-b pb-4">
                  <div className="flex gap-1 bg-slate-200/50 p-1 rounded-xl">
                    <button 
                      onClick={() => setActiveTab('grid')}
                      className={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${activeTab === 'grid' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      地圖卡片
                    </button>
                    <button 
                      onClick={() => setActiveTab('analytics')}
                      className={`px-4 py-1.5 rounded-lg text-sm font-semibold transition-all ${activeTab === 'analytics' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}
                    >
                      AI 趨勢分析
                    </button>
                  </div>
                  <div className="text-sm text-slate-500 font-medium">
                    顯示 {filteredFood.length} 項美食
                  </div>
                </div>

                {/* Content Display */}
                {activeTab === 'grid' ? (
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                    {filteredFood.length > 0 ? (
                      filteredFood.map((item) => (
                        <div key={item.id} className="group overflow-hidden rounded-2xl border bg-white shadow-sm transition-all hover:-translate-y-1 hover:shadow-xl">
                          <div className="relative h-48 bg-slate-200">
                            {/* Placeholder for Food Image */}
                            <div className="absolute inset-0 flex items-center justify-center bg-slate-100 text-slate-400 group-hover:bg-slate-200 transition-colors">
                              <Utensils size={48} className="opacity-20" />
                              <span className="absolute bottom-4 left-4 rounded-full bg-black/50 px-3 py-1 text-[10px] font-bold text-white backdrop-blur-md">
                                {item.city} • {TAIWAN_REGIONS.find(r => r.id === item.region)?.name}
                              </span>
                            </div>
                            <div className="absolute top-4 right-4 flex h-10 w-10 items-center justify-center rounded-full bg-white/90 shadow-md text-emerald-600 font-bold text-sm backdrop-blur-sm border border-emerald-100">
                              {item.aiScore}
                            </div>
                          </div>
                          <div className="p-5">
                            <div className="mb-2 flex items-center justify-between">
                              <h4 className="text-lg font-bold text-slate-800">{item.name}</h4>
                              <div className="flex items-center gap-1 text-yellow-500">
                                <Star size={14} fill="currentColor" />
                                <span className="text-sm font-bold">{item.rating}</span>
                              </div>
                            </div>
                            <div className="mb-4 flex flex-wrap gap-2">
                              {item.tags.map((tag, idx) => (
                                <span key={idx} className="rounded-full bg-slate-100 px-2.5 py-0.5 text-[10px] font-bold text-slate-600 uppercase tracking-wider">
                                  {tag}
                                </span>
                              ))}
                            </div>
                            <div className="flex items-center justify-between border-t pt-4">
                              <div className="flex items-center gap-2 text-xs text-slate-500">
                                <MapPin size={14} />
                                <span>{item.city} 區熱門推薦</span>
                              </div>
                              <button className="flex items-center gap-1 text-xs font-bold text-emerald-600 hover:underline">
                                詳細資訊 <ChevronRight size={14} />
                              </button>
                            </div>
                          </div>
                        </div>
                      ))
                    ) : (
                      <div className="col-span-full py-20 text-center">
                        <div className="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-slate-100 text-slate-400">
                          <Search size={32} />
                        </div>
                        <p className="font-bold text-slate-500">找不到符合條件的美食</p>
                        <p className="text-sm text-slate-400">試著更換區域或關鍵字</p>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="rounded-2xl border bg-white p-8 shadow-sm">
                    <div className="mb-8 flex items-center justify-between">
                      <div>
                        <h3 className="text-xl font-bold text-slate-800">美食情感聚類分析</h3>
                        <p className="text-sm text-slate-500 font-medium">基於 AI 語言模型處理之真實評論趨勢</p>
                      </div>
                      <div className="flex items-center gap-2 rounded-lg bg-slate-100 px-3 py-1 text-xs font-bold text-slate-600">
                        <TrendingUp size={14} />
                        Real-time Data
                      </div>
                    </div>
                    
                    <div className="space-y-6">
                      {filteredFood.slice(0, 5).map((item) => (
                        <div key={item.id} className="space-y-2">
                          <div className="flex items-center justify-between text-sm font-bold text-slate-700">
                            <span className="flex items-center gap-2">
                              {item.name} 
                              <span className="text-[10px] text-slate-400">({item.city})</span>
                            </span>
                            <span>正向情緒: {(item.sentiment * 100).toFixed(0)}%</span>
                          </div>
                          <div className="relative h-4 w-full overflow-hidden rounded-full bg-slate-100 shadow-inner">
                            <div 
                              className="h-full bg-gradient-to-r from-emerald-400 to-emerald-600 transition-all duration-1000 ease-out"
                              style={{ width: `${item.sentiment * 100}%` }}
                            ></div>
                          </div>
                          <div className="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                            <span>流行度: {item.popularity}/100</span>
                            <span>AI 推薦權重: {item.aiScore}</span>
                          </div>
                        </div>
                      ))}
                    </div>

                    <div className="mt-10 rounded-xl bg-slate-50 p-6 border border-dashed border-slate-300">
                      <div className="flex items-start gap-4">
                        <div className="flex h-10 w-10 shrink-0 items-center justify-center rounded-lg bg-blue-100 text-blue-600">
                          <BrainCircuit size={20} />
                        </div>
                        <div>
                          <h4 className="font-bold text-slate-800">AI 觀察結報</h4>
                          <p className="mt-1 text-sm text-slate-600 leading-relaxed">
                            根據最新的集群分析，南部地區（特別是台南）的「傳統小吃」在 2026 年第 1 季的討論度上升了 18.5%。
                            同時，台北地區的「混合料理（Fusion Food）」正在社交平台（Threads）上獲得極高傳播力，推薦您關注大稻埕附近的創意餐廳。
                          </p>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Interactive Floating Action Button for Mobile Filter */}
          <div className="fixed bottom-6 right-6 lg:hidden">
            <button className="flex h-14 w-14 items-center justify-center rounded-full bg-emerald-600 text-white shadow-2xl transition hover:bg-emerald-700 focus:outline-none focus:ring-4 focus:ring-emerald-300">
              <MousePointer2 size={24} />
            </button>
          </div>

          <footer className="mt-12 border-t bg-white py-12">
            <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
              <div className="flex flex-col items-center justify-between gap-6 md:flex-row">
                <div className="flex items-center gap-2 opacity-60 grayscale">
                  <BrainCircuit size={24} />
                  <span className="text-lg font-bold tracking-tight">AI Gastronomy Map</span>
                </div>
                <div className="flex gap-8 text-sm font-medium text-slate-500">
                  <a href="#" className="hover:text-emerald-600 transition">關於專案</a>
                  <a href="#" className="hover:text-emerald-600 transition">數據來源</a>
                  <a href="#" className="hover:text-emerald-600 transition">API 文件</a>
                  <a href="#" className="hover:text-emerald-600 transition">隱私權條款</a>
                </div>
                <p className="text-xs text-slate-400">© 2026 AI Taiwan Food Map. All Rights Reserved.</p>
              </div>
            </div>
          </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
