<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>煮過頭網頁版 (Overcooked Mini)</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --bg-color: #2c3e50;
            --text-light: #ecf0f1;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            touch-action: none; /* 防止手機瀏覽器滑動預設行為 */
        }
        #game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            background-color: #e0cda9;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* UI 覆蓋層 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0,0,0,0.5);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }
        #orders-container {
            display: flex;
            gap: 10px;
            padding: 10px 20px;
            overflow-x: auto;
        }
        .order-card {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #34495e;
            border-radius: 8px;
            padding: 5px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }
        .order-card.urgent {
            border-color: #e74c3c;
            animation: pulse 1s infinite;
        }
        .order-icon { font-size: 2rem; }
        .order-timer {
            width: 100%;
            height: 5px;
            background: #ccc;
            margin-top: 5px;
            border-radius: 3px;
        }
        .order-timer-bar {
            height: 100%;
            background: #2ecc71;
            border-radius: 3px;
            width: 100%;
            transition: width 0.1s;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* 觸控控制面板 */
        #touch-controls {
            display: none; /* 電腦版隱藏，透過 JS 偵測顯示 */
            width: 100%;
            max-width: 800px;
            height: 150px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            box-sizing: border-box;
            justify-content: space-between;
            align-items: center;
        }
        @media (hover: none) and (pointer: coarse) {
            #touch-controls { display: flex; }
            #game-container { aspect-ratio: 16/9; } /* 手機上讓出空間給按鈕 */
        }
        .d-pad {
            position: relative;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin-left: 20px;
        }
        .d-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            user-select: none;
        }
        .d-btn:active { background: rgba(255,255,255,0.8); }
        #btn-up { top: 0; left: 40px; }
        #btn-down { bottom: 0; left: 40px; }
        #btn-left { top: 40px; left: 0; }
        #btn-right { top: 40px; right: 0; }
        
        #btn-interact {
            width: 80px;
            height: 80px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-right: 20px;
            box-shadow: 0 4px 0 #c0392b;
            user-select: none;
        }
        #btn-interact:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* 遊戲選單覆蓋層 */
        #menu-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        .title { font-size: 3rem; margin-bottom: 10px; color: #f1c40f; text-shadow: 2px 2px 4px #000; text-align: center;}
        .subtitle { font-size: 1.2rem; margin-bottom: 30px; text-align: center; max-width: 80%; line-height: 1.5; color: #ddd;}
        .btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 0 #27ae60;
            transition: all 0.1s;
        }
        .btn:hover { background: #27ae60; }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .hidden { display: none !important; }

        .tutorial { margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; font-size: 0.9rem;}
        .tutorial p { margin: 5px 0; }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui-layer">
            <div class="hud-top">
                <div id="score-display">分數: 0</div>
                <div id="time-display">時間: 3:00</div>
            </div>
            <div id="orders-container">
                <!-- 訂單會透過 JS 動態生成 -->
            </div>
        </div>

        <div id="menu-layer">
            <div class="title">瘋狂廚房<br><span style="font-size: 1.5rem;">Mini Overcooked</span></div>
            <div class="subtitle" id="game-over-text">準備好迎接混亂了嗎？</div>
            <button class="btn" id="start-btn">開始遊戲</button>
            
            <div class="tutorial" id="tutorial-text">
                <p>⌨️ 電腦：使用 WASD 或 方向鍵移動，空白鍵(Space) 互動。</p>
                <p>📱 手機：使用螢幕虛擬搖桿與按鈕。</p>
                <hr style="border-color: #555; margin:10px 0;">
                <p>🥗 <b>沙拉食譜</b>：生菜(切) + 番茄(切) 放進盤子。</p>
                <p>🍔 <b>漢堡食譜</b>：麵包 + 肉(煎熟) 放進盤子。</p>
                <p>⚠️ 注意：肉煮太久會燒焦變成垃圾！將做好的餐點送到出餐口。</p>
            </div>
        </div>
    </div>

    <div id="touch-controls">
        <div class="d-pad">
            <div class="d-btn" id="btn-up">W</div>
            <div class="d-btn" id="btn-down">S</div>
            <div class="d-btn" id="btn-left">A</div>
            <div class="d-btn" id="btn-right">D</div>
        </div>
        <div id="btn-interact">互動</div>
    </div>

    <!-- 背景音樂 -->
    <audio id="bgm" src="The_Sauce_Is_Burning.mp3" loop preload="auto" style="display:none;"></audio>

    <script>
        /**
         * 遊戲核心邏輯
         */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const menuLayer = document.getElementById('menu-layer');
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const ordersContainer = document.getElementById('orders-container');
        const gameOverText = document.getElementById('game-over-text');
        const tutorialText = document.getElementById('tutorial-text');
        // 取得背景音樂元素
        const bgm = document.getElementById('bgm');

        // 遊戲狀態與常數
        let gameState = 'menu'; // 'menu', 'playing', 'gameover'
        let lastTime = 0;
        let score = 0;
        let gameTime = 180; // 3分鐘
        let orderTimer = 0;
        let activeOrders = [];
        
        // 鍵盤狀態
        const keys = { w: false, a: false, s: false, d: false, space: false };

        // 定義物品屬性
        const ITEMS = {
            'lettuce': { id: 'lettuce', name: '生菜', emoji: '🥬', type: 'raw' },
            'tomato': { id: 'tomato', name: '番茄', emoji: '🍅', type: 'raw' },
            'meat': { id: 'meat', name: '生肉', emoji: '🥩', type: 'raw' },
            'bun': { id: 'bun', name: '麵包', emoji: '🍞', type: 'ready' },
            'chopped_lettuce': { id: 'chopped_lettuce', name: '切碎生菜', emoji: '🥗', type: 'ingredient' },
            'chopped_tomato': { id: 'chopped_tomato', name: '切片番茄', emoji: '🥫', type: 'ingredient' }, // 用罐頭圖示代替切片
            'cooked_meat': { id: 'cooked_meat', name: '熟肉', emoji: '🧆', type: 'ingredient' },
            'burnt_meat': { id: 'burnt_meat', name: '焦炭', emoji: '⬛', type: 'trash' },
            'plate': { id: 'plate', name: '盤子', emoji: '🍽️', type: 'container' },
            'salad': { id: 'salad', name: '沙拉', emoji: '🥗', type: 'meal' },
            'burger': { id: 'burger', name: '漢堡', emoji: '🍔', type: 'meal' }
        };

        // 食譜定義
        const RECIPES = {
            'salad': ['chopped_lettuce', 'chopped_tomato'],
            'burger': ['bun', 'cooked_meat']
        };

        // 玩家物件
        const player = {
            x: 400, y: 300, radius: 20, speed: 300, // 像素/秒
            vx: 0, vy: 0,
            angle: 0, // 朝向
            holding: null, // 目前持有的物品 (字串 id 或 盤子物件)
            interactCooldown: 0
        };

        // 工作檯陣列
        let stations = [];

        // 初始化工作檯佈局
        function initStations() {
            stations = [
                // 頂部牆 - 食材箱
                { x: 100, y: 0, w: 80, h: 60, type: 'crate', item: 'lettuce', color: '#8b5a2b', label: '🥬' },
                { x: 200, y: 0, w: 80, h: 60, type: 'crate', item: 'tomato', color: '#8b5a2b', label: '🍅' },
                { x: 300, y: 0, w: 80, h: 60, type: 'crate', item: 'meat', color: '#8b5a2b', label: '🥩' },
                { x: 400, y: 0, w: 80, h: 60, type: 'crate', item: 'bun', color: '#8b5a2b', label: '🍞' },
                { x: 600, y: 0, w: 80, h: 60, type: 'crate', item: 'plate', color: '#a0522d', label: '🍽️盤' },

                // 左側牆 - 切菜板
                { x: 0, y: 150, w: 60, h: 80, type: 'cutting_board', holding: null, progress: 0, color: '#f0e68c', label: '🔪' },
                { x: 0, y: 300, w: 60, h: 80, type: 'cutting_board', holding: null, progress: 0, color: '#f0e68c', label: '🔪' },

                // 右側牆 - 爐子
                { x: 740, y: 150, w: 60, h: 80, type: 'stove', holding: null, progress: 0, color: '#555', label: '🔥' },
                { x: 740, y: 300, w: 60, h: 80, type: 'stove', holding: null, progress: 0, color: '#555', label: '🔥' },

                // 底部牆 - 垃圾桶、出餐口、組裝檯
                { x: 100, y: 540, w: 80, h: 60, type: 'trash', color: '#2f4f4f', label: '🗑️' },
                { x: 350, y: 540, w: 120, h: 60, type: 'delivery', color: '#2ecc71', label: '出餐口' },
                
                // 中央/底部組裝檯 (Counter)
                { x: 600, y: 540, w: 80, h: 60, type: 'counter', holding: null, color: '#bdc3c7', label: '檯面' },
                { x: 250, y: 350, w: 80, h: 60, type: 'counter', holding: null, color: '#bdc3c7', label: '檯面' },
                { x: 450, y: 350, w: 80, h: 60, type: 'counter', holding: null, color: '#bdc3c7', label: '檯面' },
            ];
        }

        // 開始遊戲
        function startGame() {
            gameState = 'playing';
            score = 0;
            gameTime = 180;
            activeOrders = [];
            orderTimer = 0;
            player.x = 400;
            player.y = 300;
            player.holding = null;
            initStations();
            menuLayer.classList.add('hidden');
            lastTime = performance.now();
            updateUI();
            requestAnimationFrame(gameLoop);

            // 播放音樂 (需要使用者互動才能觸發)
            bgm.currentTime = 0;
            bgm.play().catch(e => console.warn("BGM autoplay blocked by browser policy"));
            
            // 初始產生兩個訂單
            generateOrder();
            generateOrder();
        }

        // 結束遊戲
        function endGame() {
            gameState = 'gameover';

            // 停止音樂
            bgm.pause();

            menuLayer.classList.remove('hidden');
            document.querySelector('.title').innerHTML = '時間到！';
            gameOverText.innerHTML = `你的最終分數是: <span style="color:#f1c40f; font-size:1.5rem; font-weight:bold;">${score}</span> 分<br>準備好再挑戰一次了嗎？`;
            startBtn.innerText = '再玩一次';
            tutorialText.style.display = 'none';
        }

        // 產生訂單
        function generateOrder() {
            if (activeOrders.length >= 5) return; // 最多5個訂單
            const orderTypes = ['salad', 'burger'];
            const type = orderTypes[Math.floor(Math.random() * orderTypes.length)];
            const timeLimit = type === 'salad' ? 60 : 70; // 秒
            
            activeOrders.push({
                id: Math.random().toString(36).substr(2, 9),
                type: type,
                maxTime: timeLimit,
                timeLeft: timeLimit
            });
            updateOrdersUI();
        }

        // 檢查出餐
        function deliverOrder(item) {
            if (!item) return false;
            
            // 必須是裝在盤子裡的完成品，或是直接手拿完成品
            let mealType = null;
            if (typeof item === 'object' && item.type === 'plate' && item.meal) {
                mealType = item.meal;
            } else if (typeof item === 'string' && (item === 'salad' || item === 'burger')) {
                // 技術上遊戲設計必須裝盤，但以防萬一
                mealType = item;
            }

            if (!mealType) return false;

            // 尋找符合的訂單
            const orderIndex = activeOrders.findIndex(o => o.type === mealType);
            if (orderIndex !== -1) {
                // 成功出餐
                const order = activeOrders[orderIndex];
                let points = 20;
                if (order.timeLeft > order.maxTime * 0.5) points += 10; // 快速出餐獎勵
                
                score += points;
                activeOrders.splice(orderIndex, 1);
                
                // 顯示得分特效 (簡單實作，可略)
                updateUI();
                updateOrdersUI();
                
                // 產生新訂單 (稍微延遲)
                setTimeout(generateOrder, 2000);
                return true; // 成功接收並消耗物品
            }
            return false; // 不是我們要的訂單
        }

        // 更新 HTML UI
        function updateUI() {
            scoreDisplay.innerText = `分數: ${score}`;
            const mins = Math.floor(gameTime / 60);
            const secs = Math.floor(gameTime % 60).toString().padStart(2, '0');
            timeDisplay.innerText = `時間: ${mins}:${secs}`;
            if (gameTime <= 30) {
                timeDisplay.style.color = '#e74c3c';
            } else {
                timeDisplay.style.color = 'white';
            }
        }

        // 更新訂單 UI
        function updateOrdersUI() {
            ordersContainer.innerHTML = '';
            activeOrders.forEach(order => {
                const percent = (order.timeLeft / order.maxTime) * 100;
                const isUrgent = percent < 25;
                const itemDef = ITEMS[order.type];
                
                const card = document.createElement('div');
                card.className = `order-card ${isUrgent ? 'urgent' : ''}`;
                card.innerHTML = `
                    <div class="order-icon">${itemDef.emoji}</div>
                    <div style="font-size: 0.8rem; font-weight:bold; color:#333;">${itemDef.name}</div>
                    <div class="order-timer">
                        <div class="order-timer-bar" style="width: ${percent}%; background: ${isUrgent ? '#e74c3c' : (percent < 50 ? '#f1c40f' : '#2ecc71')}"></div>
                    </div>
                `;
                ordersContainer.appendChild(card);
            });
        }

        // 碰撞檢測 (AABB)
        function checkCollision(x, y, radius, rect) {
            // 找到矩形上離圓心最近的點
            const testX = Math.max(rect.x, Math.min(x, rect.x + rect.w));
            const testY = Math.max(rect.y, Math.min(y, rect.y + rect.h));
            
            // 計算距離
            const distX = x - testX;
            const distY = y - testY;
            const distance = Math.sqrt((distX*distX) + (distY*distY));
            
            return distance <= radius;
        }

        // 取得玩家面向的工作檯
        function getFacingStation() {
            // 計算玩家前方的檢查點
            const reach = 30;
            const checkX = player.x + Math.cos(player.angle) * reach;
            const checkY = player.y + Math.sin(player.angle) * reach;
            
            // 尋找包含這個檢查點的工作檯，或者距離最近的
            let closestStation = null;
            let minDist = Infinity;

            for (let s of stations) {
                // 檢查中心點距離
                const sCenterX = s.x + s.w/2;
                const sCenterY = s.y + s.h/2;
                const dist = Math.sqrt((checkX - sCenterX)**2 + (checkY - sCenterY)**2);
                
                if (dist < 50 && dist < minDist) { // 50是互動判定半徑
                    minDist = dist;
                    closestStation = s;
                }
            }
            return closestStation;
        }

        // 處理盤子組合邏輯
        function addToPlate(plateObj, itemString) {
            if (!plateObj.items) plateObj.items = [];
            if (plateObj.meal) return false; // 已經是完成品了
            
            const validIngredients = ['bun', 'chopped_lettuce', 'chopped_tomato', 'cooked_meat'];
            if (!validIngredients.includes(itemString)) return false;

            if (plateObj.items.includes(itemString)) return false; // 不重複加

            plateObj.items.push(itemString);
            plateObj.items.sort(); // 排序以便比對

            // 檢查是否完成食譜
            for (let [mealName, reqItems] of Object.entries(RECIPES)) {
                let reqSorted = [...reqItems].sort();
                if (JSON.stringify(plateObj.items) === JSON.stringify(reqSorted)) {
                    plateObj.meal = mealName; // 變成完成品
                    plateObj.items = []; // 清空個別食材
                    break;
                }
            }
            return true;
        }

        // 互動邏輯
        function handleInteraction() {
            if (player.interactCooldown > 0) return;
            player.interactCooldown = 0.2; // 防連點 (秒)

            const station = getFacingStation();
            if (!station) return;

            // --- 情況 1：玩家空手 ---
            if (!player.holding) {
                if (station.type === 'crate') {
                    // 拿取食材/盤子
                    if (station.item === 'plate') {
                        player.holding = { type: 'plate', items: [], meal: null };
                    } else {
                        player.holding = station.item;
                    }
                } 
                else if (station.holding) {
                    // 從工作檯拿走東西
                    // 如果是切菜板或爐子，且進度未完成，不可拿取 (或者可以中斷？這裡設計為只能拿完成或燒焦的)
                    if (station.type === 'cutting_board' || station.type === 'stove') {
                        if (station.progress >= 1 || station.holding === 'burnt_meat') {
                            player.holding = station.holding;
                            station.holding = null;
                            station.progress = 0;
                        } else {
                            // 處理中，不能拿
                        }
                    } else {
                        // 普通檯面，直接拿走
                        player.holding = station.holding;
                        station.holding = null;
                    }
                }
            } 
            // --- 情況 2：玩家手上有東西 ---
            else {
                if (station.type === 'trash') {
                    // 丟垃圾
                    player.holding = null;
                }
                else if (station.type === 'delivery') {
                    // 出餐
                    if (deliverOrder(player.holding)) {
                        // 成功出餐，盤子也被收走
                        player.holding = null;
                    } else {
                        // 錯誤餐點，可能會扣分？這裡先不做懲罰，就送不出去
                    }
                }
                else if (station.type === 'cutting_board' && !station.holding) {
                    // 放上去切
                    if (player.holding === 'lettuce' || player.holding === 'tomato') {
                        station.holding = player.holding;
                        station.progress = 0;
                        player.holding = null;
                    }
                }
                else if (station.type === 'stove' && !station.holding) {
                    // 放上去煎
                    if (player.holding === 'meat') {
                        station.holding = player.holding;
                        station.progress = 0;
                        player.holding = null;
                    }
                }
                else if (station.type === 'counter') {
                    // 檯面互動
                    if (!station.holding) {
                        // 檯面空，直接放下
                        station.holding = player.holding;
                        player.holding = null;
                    } else {
                        // 檯面有東西，嘗試組合
                        let itemOnCounter = station.holding;
                        let itemInHand = player.holding;

                        // 手上是食材，檯面上是盤子
                        if (typeof itemInHand === 'string' && typeof itemOnCounter === 'object' && itemOnCounter.type === 'plate') {
                            if (addToPlate(itemOnCounter, itemInHand)) {
                                player.holding = null; // 食材放上去了
                            }
                        }
                        // 手上是盤子，檯面上是食材 (反向操作也支援)
                        else if (typeof itemInHand === 'object' && itemInHand.type === 'plate' && typeof itemOnCounter === 'string') {
                            if (addToPlate(itemInHand, itemOnCounter)) {
                                station.holding = null; // 檯面食材被裝盤了
                            }
                        }
                    }
                }
            }
        }

        // 更新遊戲邏輯
        function update(dt) {
            // 處理玩家冷卻
            if (player.interactCooldown > 0) player.interactCooldown -= dt;

            // 處理移動輸入
            player.vx = 0;
            player.vy = 0;
            if (keys.w) player.vy -= 1;
            if (keys.s) player.vy += 1;
            if (keys.a) player.vx -= 1;
            if (keys.d) player.vx += 1;

            // 正規化斜向移動速度
            if (player.vx !== 0 || player.vy !== 0) {
                const length = Math.sqrt(player.vx * player.vx + player.vy * player.vy);
                player.vx = (player.vx / length) * player.speed;
                player.vy = (player.vy / length) * player.speed;
                // 更新朝向
                player.angle = Math.atan2(player.vy, player.vx);
            }

            // 計算預期位置
            let nextX = player.x + player.vx * dt;
            let nextY = player.y + player.vy * dt;

            // 邊界碰撞
            if (nextX - player.radius < 0) nextX = player.radius;
            if (nextX + player.radius > canvas.width) nextX = canvas.width - player.radius;
            if (nextY - player.radius < 0) nextY = player.radius;
            if (nextY + player.radius > canvas.height) nextY = canvas.height - player.radius;

            // 工作檯碰撞 (滑動碰撞處理)
            let finalX = nextX;
            let finalY = nextY;

            // X 軸移動測試
            for (let s of stations) {
                if (checkCollision(nextX, player.y, player.radius, s)) {
                    finalX = player.x; // 發生碰撞，取消 X 軸移動
                    break;
                }
            }
            // Y 軸移動測試
            for (let s of stations) {
                if (checkCollision(finalX, nextY, player.radius, s)) {
                    finalY = player.y; // 發生碰撞，取消 Y 軸移動
                    break;
                }
            }

            player.x = finalX;
            player.y = finalY;

            // 互動按鍵
            if (keys.space) {
                handleInteraction();
                keys.space = false; // 防止按住連發
            }

            // 更新工作檯處理進度 (切菜/烹煮)
            for (let s of stations) {
                if (s.type === 'cutting_board' && s.holding && s.progress < 1) {
                    s.progress += dt / 3.0; // 3秒切完
                    if (s.progress >= 1) {
                        s.progress = 1;
                        if (s.holding === 'lettuce') s.holding = 'chopped_lettuce';
                        if (s.holding === 'tomato') s.holding = 'chopped_tomato';
                    }
                }
                if (s.type === 'stove' && s.holding) {
                    if (s.holding === 'meat') {
                        s.progress += dt / 4.0; // 4秒煮熟
                        if (s.progress >= 1) {
                            s.holding = 'cooked_meat';
                            s.progress = 1; // 進入過熱階段
                        }
                    } else if (s.holding === 'cooked_meat') {
                        s.progress += dt / 5.0; // 再5秒燒焦
                        if (s.progress >= 2) {
                            s.holding = 'burnt_meat';
                            s.progress = 0;
                        }
                    }
                }
            }

            // 更新訂單時間
            let activeOrdersChanged = false;
            for (let i = activeOrders.length - 1; i >= 0; i--) {
                activeOrders[i].timeLeft -= dt;
                if (activeOrders[i].timeLeft <= 0) {
                    // 訂單失敗，扣分
                    score = Math.max(0, score - 10);
                    activeOrders.splice(i, 1);
                    activeOrdersChanged = true;
                }
            }
            if (activeOrdersChanged) updateOrdersUI();

            // 產生新訂單計時器
            orderTimer += dt;
            if (orderTimer > 15) { // 每15秒嘗試產生新訂單
                orderTimer = 0;
                generateOrder();
            }

            // 遊戲時間
            gameTime -= dt;
            if (gameTime <= 0) {
                gameTime = 0;
                endGame();
            }
        }

        // 輔助繪製物品函數
        function drawItem(ctx, itemObj, x, y, size = 30) {
            ctx.save();
            ctx.translate(x, y);
            
            if (typeof itemObj === 'string') {
                // 單一食材
                const def = ITEMS[itemObj];
                if (def) {
                    ctx.font = `${size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(def.emoji, 0, 0);
                }
            } else if (typeof itemObj === 'object' && itemObj.type === 'plate') {
                // 畫盤子
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(0, 0, size/1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#ccc';
                ctx.stroke();

                if (itemObj.meal) {
                    // 畫完成品
                    ctx.font = `${size*0.9}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(ITEMS[itemObj.meal].emoji, 0, 0);
                } else if (itemObj.items && itemObj.items.length > 0) {
                    // 畫盤子上的零散食材 (簡單疊加)
                    const offset = size/4;
                    itemObj.items.forEach((it, idx) => {
                        ctx.font = `${size*0.6}px Arial`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        const dx = idx === 0 ? -offset : offset;
                        const dy = idx === 2 ? offset : -offset/2;
                        ctx.fillText(ITEMS[it].emoji, dx, dy);
                    });
                }
            }
            ctx.restore();
        }

        // 渲染遊戲
        function render() {
            // 清除畫布
            ctx.fillStyle = '#e0cda9'; // 地板顏色
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 畫地磚線條(裝飾)
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            for(let i=0; i<canvas.height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 取得目前面向的工作檯，用於高亮顯示
            const activeStation = getFacingStation();

            // 繪製工作檯
            for (let s of stations) {
                // 底色
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x, s.y, s.w, s.h);
                
                // 邊框
                ctx.strokeStyle = s === activeStation ? 'white' : '#333';
                ctx.lineWidth = s === activeStation ? 4 : 2;
                ctx.strokeRect(s.x, s.y, s.w, s.h);

                // 標籤/圖示 (Crate, Delivery, Trash)
                if (s.label) {
                    ctx.fillStyle = s === activeStation ? 'white' : '#000';
                    ctx.font = s.type==='crate' ? '24px Arial' : '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    if (s.type === 'crate') {
                        // 箱子畫木紋感和圖示
                        ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2);
                    } else {
                        ctx.fillText(s.label, s.x + s.w/2, s.y + s.h/2);
                    }
                }

                // 如果工作檯上有東西，畫出來
                if (s.holding) {
                    drawItem(ctx, s.holding, s.x + s.w/2, s.y + s.h/2, 35);
                }

                // 進度條 (切菜/烹煮)
                if ((s.type === 'cutting_board' || s.type === 'stove') && s.holding && typeof s.holding === 'string') {
                    if (s.progress > 0) {
                        const barW = s.w * 0.8;
                        const barH = 6;
                        const bx = s.x + s.w*0.1;
                        const by = s.y + s.h - 15;
                        
                        // 背景
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.fillRect(bx, by, barW, barH);
                        
                        // 進度
                        let pColor = '#2ecc71'; // 綠色正常進度
                        let pValue = s.progress;
                        
                        if (s.type === 'stove' && s.holding === 'cooked_meat') {
                            pColor = '#e74c3c'; // 紅色燒焦警告
                            pValue = s.progress - 1; // 1~2區間轉換為 0~1
                        }

                        ctx.fillStyle = pColor;
                        ctx.fillRect(bx, by, barW * pValue, barH);
                    }
                }
            }

            // 繪製玩家
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 陰影
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.arc(0, 15, player.radius, 0, Math.PI*2); ctx.fill();

            ctx.rotate(player.angle);
            
            // 身體
            ctx.fillStyle = '#3498db';
            ctx.beginPath();
            ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#2980b9';
            ctx.stroke();

            // 面朝方向指示 (手)
            ctx.fillStyle = '#f39c12';
            ctx.beginPath();
            ctx.arc(player.radius, 0, 8, 0, Math.PI * 2);
            ctx.fill();

            // 廚師帽
            ctx.rotate(-player.angle); // 讓帽子保持正向
            ctx.font = '24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('🧑‍🍳', 0, -5);

            ctx.restore();

            // 畫玩家手上的物品
            if (player.holding) {
                // 物品畫在玩家前方稍微偏上的位置
                const holdX = player.x + Math.cos(player.angle) * 20;
                const holdY = player.y + Math.sin(player.angle) * 20 - 15;
                drawItem(ctx, player.holding, holdX, holdY, 30);
            }
        }

        // 遊戲主迴圈
        function gameLoop(timestamp) {
            if (gameState !== 'playing') return;

            // 計算 delta time (秒)
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // 防止跳窗過久導致大跳躍
            lastTime = timestamp;

            update(dt);
            render();
            
            // 每秒更新一次 UI
            if (Math.floor(gameTime) !== Math.floor(gameTime + dt)) {
                updateUI();
                updateOrdersUI();
            }

            requestAnimationFrame(gameLoop);
        }

        /**
         * 輸入事件監聽
         */
        window.addEventListener('keydown', (e) => {
            if (gameState !== 'playing') return;
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = true;
            if (key === 'a' || key === 'arrowleft') keys.a = true;
            if (key === 's' || key === 'arrowdown') keys.s = true;
            if (key === 'd' || key === 'arrowright') keys.d = true;
            if (key === ' ' || key === 'spacebar') { keys.space = true; e.preventDefault(); }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w' || key === 'arrowup') keys.w = false;
            if (key === 'a' || key === 'arrowleft') keys.a = false;
            if (key === 's' || key === 'arrowdown') keys.s = false;
            if (key === 'd' || key === 'arrowright') keys.d = false;
            if (key === ' ' || key === 'spacebar') keys.space = false;
        });

        startBtn.addEventListener('click', startGame);

        // --- 觸控介面邏輯 ---
        const btnUp = document.getElementById('btn-up');
        const btnDown = document.getElementById('btn-down');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnInteract = document.getElementById('btn-interact');

        const setupTouchBtn = (btn, keyProp) => {
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyProp] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyProp] = false; });
            // 滑鼠支援 (測試用)
            btn.addEventListener('mousedown', (e) => { keys[keyProp] = true; });
            btn.addEventListener('mouseup', (e) => { keys[keyProp] = false; });
            btn.addEventListener('mouseleave', (e) => { keys[keyProp] = false; });
        };

        setupTouchBtn(btnUp, 'w');
        setupTouchBtn(btnDown, 's');
        setupTouchBtn(btnLeft, 'a');
        setupTouchBtn(btnRight, 'd');
        
        // 互動按鈕特別處理 (單次點擊)
        btnInteract.addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if(gameState === 'playing') keys.space = true; 
        });
        btnInteract.addEventListener('mousedown', (e) => { 
            if(gameState === 'playing') keys.space = true; 
        });

        // 防止手機雙擊縮放
        document.addEventListener('dblclick', function(event) {
            event.preventDefault();
        }, { passive: false });

    </script>
</body>
